<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> GCRY Token</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .wallet {
      word-break: break-all;
      background: #0f172a;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1> GCRY Token</h1>
    <p>Gold & Crypto</p>

    <h3>Wallet Address</h3>
    <div class="wallet" id="wallet">
      GAQY4XH54SCRJZHRTSSH4GD6DXORC3DYY7WBA7YH4TDG33YUJDDK4PX3
    </div>

    <button onclick="copyWallet()">Copy Wallet</button>
    <button onclick="connectWallet()">Connect Pi Wallet</button>
    <button onclick="showToken()">Token Info</button>
  </div>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <script>
    const walletAddress = "GAQY4XH54SCRJZHRTSSH4GD6DXORC3DYY7WBA7YH4TDG33YUJDDK4PX3";

    function copyWallet() {
      navigator.clipboard.writeText(walletAddress);
      alert("Wallet copied");
    }

    function showToken() {
      alert(
        "Token: GCRY\n" +
        "Name: Gold & Crypto\n" +
        "Wallet: " + walletAddress + "\n" +
        "Status: Test Token"
      );
    }

    Pi.init({ version: "2.0" });

    async function connectWallet() {
      try {
        const scopes = ['payments'];
        const auth = await Pi.authenticate(scopes);
        alert("Connected: " + auth.user.username);
      } catch (error) {
        console.error(error);
        alert("Connection failed");
      }
    }
  </script>

</body>
</html>
